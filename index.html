<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>R2 Cloud Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f5f2ec; --surface:#fff; --surface2:#f0ede6; --border:#e0dbd0;
      --ink:#1c1a16; --ink2:#5a5650; --accent:#c8441a; --radius:8px;
      --shadow:0 2px 8px rgba(0,0,0,.05); --success:#2d7a45; --danger:#c8441a;
      --blue:#2a6496;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--ink);font-family:'Sora',sans-serif;min-height:100vh;line-height:1.5}

    /* LOGIN */
    #login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100;padding:20px}
    .login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px 30px;width:100%;max-width:400px;box-shadow:var(--shadow)}
    .field-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-family:'JetBrains Mono',monospace;margin:8px 0 20px;outline:none;font-size:14px}
    .btn-primary{width:100%;background:var(--ink);color:var(--bg);border:none;border-radius:var(--radius);padding:14px;font-weight:700;cursor:pointer;font-size:15px}

    /* APP */
    #app{display:none}
    header{background:var(--ink);color:var(--bg);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
    .breadcrumb-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:8px;font-size:13px;overflow-x:auto;white-space:nowrap}
    .bc-item{color:var(--accent);font-weight:600;cursor:pointer}
    .bc-sep{color:#aaa}

    main{max-width:1200px;margin:0 auto;padding:20px}
    .upload-area{border:2px dashed var(--border);border-radius:var(--radius);background:var(--surface);margin-bottom:24px;text-align:center;padding:40px 20px;cursor:pointer;transition:.3s}
    .upload-area:hover,.upload-area.dragover{border-color:var(--accent);background:var(--surface2)}

    .toolbar{display:flex;justify-content:space-between;margin-bottom:20px;align-items:center;flex-wrap:wrap;gap:15px}
    .btn-action{background:var(--surface);border:1px solid var(--border);padding:10px 16px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:600;font-family:'Sora',sans-serif}
    .btn-action:hover{background:var(--surface2)}

    .file-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
    .table-head,.file-row{display:grid;grid-template-columns:44px 1fr 80px 100px 310px;padding:12px 16px;align-items:center;border-bottom:1px solid var(--border)}
    .table-head{background:var(--surface2);font-size:11px;font-weight:700;color:var(--ink2);text-transform:uppercase}
    .file-row:hover{background:var(--surface2)}
    .file-row.is-folder{cursor:pointer}
    .file-name-cell{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px}
    .meta-cell{font-size:12px;color:var(--ink2);font-family:'JetBrains Mono',monospace}

    .action-group{display:flex;gap:4px;justify-content:flex-end;flex-wrap:nowrap;align-items:center}
    .action-btn{background:none;border:1px solid var(--border);padding:4px 8px;font-size:11px;cursor:pointer;border-radius:4px;transition:.2s;font-family:'Sora',sans-serif;white-space:nowrap}
    .action-btn:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
    .action-btn.danger{color:var(--danger)}
    .action-btn.danger:hover{background:var(--danger);border-color:var(--danger)}
    .action-btn.share-btn{color:var(--blue);border-color:var(--blue)}
    .action-btn.share-btn:hover{background:var(--blue);color:#fff}

    @media(max-width:900px){
      .table-head{display:none}
      .file-row{grid-template-columns:40px 1fr;padding:14px 16px;gap:4px 12px}
      .file-name-cell{grid-column:2;font-weight:700;font-size:14px;word-break:break-all}
      .meta-cell{grid-column:2;display:flex;gap:8px;flex-wrap:wrap;font-size:11px}
      .action-group{grid-column:1/span 2;display:grid;grid-template-columns:repeat(3,1fr);margin-top:8px;gap:5px}
      .action-btn{text-align:center;padding:8px 4px;font-size:11px}
      /* 分享页文件夹列表手机端 */
      .share-row{grid-template-columns:32px 1fr !important}
      .share-row-size{display:none}
      .share-row-btn{grid-column:1/span 2;display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:6px;padding-bottom:4px}
      .share-row-dl{text-align:center;padding:8px 4px !important;font-size:12px !important}
      /* 分享页单文件手机端 */
      .share-file-card{flex-direction:column;align-items:flex-start !important}
      .share-file-actions{flex-wrap:wrap;width:100%}
      .share-dl-btn,.share-preview-btn{flex:1;text-align:center}
    }

    /* ══ 上传进度面板 ══ */
    #upload-panel{position:fixed;top:68px;right:16px;width:320px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.12);z-index:200;overflow:hidden;display:none;flex-direction:column}
    #upload-panel.visible{display:flex}
    .up-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--ink);color:#fff;cursor:pointer;user-select:none}
    .up-header-left{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
    .up-badge{background:var(--accent);color:#fff;border-radius:20px;padding:1px 8px;font-size:11px;font-family:'JetBrains Mono',monospace;min-width:24px;text-align:center}
    .up-badge.done{background:var(--success)}
    .up-toggle{font-size:11px;color:rgba(255,255,255,.6);transition:transform .25s}
    .up-toggle.collapsed{transform:rotate(180deg)}
    .up-body{max-height:320px;overflow-y:auto;transition:max-height .3s ease}
    .up-body.collapsed{max-height:0}
    .up-item{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
    .up-item:last-child{border-bottom:none}
    .up-item-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .up-item-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .up-item-pct{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--ink2);min-width:36px;text-align:right}
    .up-bar-bg{height:4px;background:var(--border);border-radius:3px;overflow:hidden}
    .up-bar-fill{height:100%;width:0%;border-radius:3px;background:var(--accent);transition:width .15s}
    .up-bar-fill.success{background:var(--success)}
    .up-bar-fill.fail{background:var(--danger);width:100%!important}
    .up-status{font-size:11px;color:var(--ink2)}
    .up-status.ok{color:var(--success)}
    .up-status.err{color:var(--danger)}
    .up-footer{padding:8px 16px;background:var(--surface2);font-size:11px;color:var(--ink2);font-family:'JetBrains Mono',monospace;display:flex;justify-content:space-between;border-top:1px solid var(--border)}
    .up-footer-clear{color:var(--accent);cursor:pointer;font-weight:600}

    /* ══ 迷你音频播放器（紧凑单行）══ */
    #mini-player{
      position:fixed; bottom:16px; right:16px;
      background:rgba(28,26,22,0.95);
      backdrop-filter:blur(8px);
      color:#fff;
      border-radius:40px;
      box-shadow:0 4px 20px rgba(0,0,0,.3);
      z-index:700;
      display:none;
      align-items:center;
      gap:8px;
      padding:6px 10px 6px 14px;
      min-width:0; max-width:320px;
      transition:opacity .2s;
    }
    #mini-player.visible{display:flex}
    .mp-icon{font-size:14px;flex-shrink:0;opacity:.7}
    .mp-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;max-width:120px}
    .mp-time{font-size:10px;color:rgba(255,255,255,.45);font-family:'JetBrains Mono',monospace;white-space:nowrap;flex-shrink:0}
    /* range 滑块样式 */
    #mp-seek::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 0 3px rgba(0,0,0,.4)}
    #mp-seek::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer;border:none}
    .mp-btn{background:none;border:none;color:#fff;cursor:pointer;font-size:15px;padding:3px 4px;opacity:.8;transition:opacity .15s;line-height:1;flex-shrink:0}
    .mp-btn:hover{opacity:1}
    .mp-btn.close-btn{font-size:12px;opacity:.4}
    .mp-btn.close-btn:hover{opacity:1}
    .mp-btn.list-btn{font-size:13px;opacity:.5}
    .mp-btn.list-btn:hover{opacity:1}
    /* 音频列表弹出层 */
    #mp-playlist{
      position:fixed;bottom:52px;right:16px;
      width:280px;max-height:320px;
      background:rgba(20,18,14,0.97);
      border:1px solid rgba(255,255,255,.12);
      border-radius:12px;
      overflow-y:auto;
      z-index:710;
      display:none;
      flex-direction:column;
      box-shadow:0 8px 32px rgba(0,0,0,.5);
    }
    #mp-playlist.open{display:flex}
    .mp-playlist-header{
      padding:10px 14px;
      font-size:11px;font-weight:700;
      color:rgba(255,255,255,.4);
      letter-spacing:.1em;text-transform:uppercase;
      border-bottom:1px solid rgba(255,255,255,.08);
      flex-shrink:0;
    }
    .mp-playlist-item{
      display:flex;align-items:center;gap:10px;
      padding:10px 14px;
      cursor:pointer;
      border-bottom:1px solid rgba(255,255,255,.05);
      transition:background .15s;
    }
    .mp-playlist-item:last-child{border-bottom:none}
    .mp-playlist-item:hover{background:rgba(255,255,255,.07)}
    .mp-playlist-item.playing{background:rgba(232,201,122,.1)}
    .mp-playlist-item-icon{font-size:16px;flex-shrink:0}
    .mp-playlist-item-name{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .mp-playlist-item-playing{font-size:10px;color:#e8c97a;flex-shrink:0}

    /* ══ 分享弹窗 ══ */
    #share-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:center;justify-content:center;padding:20px}
    #share-modal.open{display:flex}
    .share-box{background:var(--surface);border-radius:12px;padding:28px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .share-title{font-size:16px;font-weight:700;margin-bottom:4px}
    .share-sub{font-size:13px;color:var(--ink2);margin-bottom:20px}
    .share-link-wrap{display:flex;gap:8px;margin-bottom:16px}
    .share-link-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 13px;font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;color:var(--ink)}
    .share-copy-btn{background:var(--ink);color:#fff;border:none;border-radius:var(--radius);padding:10px 16px;cursor:pointer;font-weight:700;font-size:13px;white-space:nowrap;font-family:'Sora',sans-serif}
    .share-copy-btn:hover{background:var(--blue)}
    .share-close-btn{width:100%;background:transparent;border:1px solid var(--border);border-radius:var(--radius);padding:10px;cursor:pointer;font-size:13px;font-family:'Sora',sans-serif}
    .share-close-btn:hover{background:var(--surface2)}
    .share-loading{text-align:center;padding:20px;color:var(--ink2);font-size:13px}

    /* OVERLAY */
    #overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
    #overlay.show{display:flex}
    .overlay-box{background:#fff;border-radius:12px;padding:32px 40px;text-align:center;min-width:260px}
    .overlay-box p{margin-top:12px;color:var(--ink2);font-size:14px}

    #toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 22px;border-radius:40px;display:none;z-index:2000;font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap}

    /* ══ 分享页面 ══ */
    #share-page{display:none;min-height:100vh}
    .share-page-header{background:var(--ink);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;gap:12px}
    .share-page-body{max-width:900px;margin:0 auto;padding:32px 20px}
    .share-page-title{font-size:22px;font-weight:700;margin-bottom:6px}
    .share-page-sub{font-size:13px;color:var(--ink2);margin-bottom:28px;font-family:'JetBrains Mono',monospace}
    .share-file-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow)}
    .share-file-icon{font-size:40px}
    .share-file-info{flex:1}
    .share-file-name{font-size:16px;font-weight:700;margin-bottom:4px}
    .share-file-meta{font-size:12px;color:var(--ink2);font-family:'JetBrains Mono',monospace}
    .share-file-actions{display:flex;gap:8px}
    .share-dl-btn{background:var(--ink);color:#fff;border:none;border-radius:var(--radius);padding:10px 20px;cursor:pointer;font-weight:700;font-size:13px;font-family:'Sora',sans-serif}
    .share-preview-btn{background:transparent;border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;cursor:pointer;font-size:13px;font-family:'Sora',sans-serif}
    .share-folder-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .share-row{display:grid;grid-template-columns:40px 1fr 80px 200px;padding:12px 16px;border-bottom:1px solid var(--border);align-items:center;gap:0}
    .share-row:last-child{border-bottom:none}
    .share-row:hover{background:var(--surface2)}
    .share-row-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .share-row-size{font-size:11px;color:var(--ink2);font-family:'JetBrains Mono',monospace}
    .share-row-btn{display:flex;gap:5px;justify-content:flex-end;flex-wrap:nowrap}
    .share-row-dl{background:none;border:1px solid var(--border);border-radius:4px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:'Sora',sans-serif}
    .share-row-dl:hover{background:var(--ink);color:#fff}
  </style>
</head>
<body>

<!-- ══ 分享页面（无需登录）══ -->
<div id="share-page">
  <div class="share-page-header">
    <span style="font-size:20px">📁</span>
    <span style="font-weight:700;letter-spacing:.05em">R2 Cloud — 共享文件</span>
  </div>
  <div class="share-page-body" id="share-page-body">
    <div style="text-align:center;padding:60px;color:var(--ink2)">加载中...</div>
  </div>
</div>

<!-- ══ 登录页 ══ -->
<div id="login-screen">
  <div class="login-box">
    <h2 style="margin-bottom:20px;text-align:center">R2 Cloud Manager</h2>
    <input class="field-input" id="inp-worker" placeholder="Worker URL (https://...)">
    <input class="field-input" id="inp-key" type="password" placeholder="Access Key">
    <button class="btn-primary" onclick="saveConfig()">登录系统</button>
  </div>
</div>

<!-- ══ 主界面 ══ -->
<div id="app">
  <header>
    <div style="font-weight:700;letter-spacing:.1em">▣ R2 STORAGE</div>
    <button onclick="clearConfig()" style="background:none;border:none;color:rgba(255,255,255,.7);font-size:12px;cursor:pointer">退出</button>
  </header>
  <div class="breadcrumb-bar" id="breadcrumb"></div>
  <main>
    <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div style="font-weight:700;font-size:16px">☁ 点击或拖拽上传到当前目录</div>
      <div style="font-size:13px;color:var(--ink2);margin-top:6px">支持多文件 · 自动分片 · 无大小限制</div>
      <input type="file" id="file-input" multiple style="display:none" onchange="handleUpload(this.files)">
    </div>
    <div class="toolbar">
      <div style="display:flex;gap:8px">
        <button class="btn-action" onclick="createFolder()">+ 文件夹</button>
        <button class="btn-action" onclick="refreshFiles()">↺ 刷新</button>
        <button class="btn-action share-btn" style="color:var(--blue);border-color:var(--blue)" onclick="shareCurrentFolder()">🔗 分享此文件夹</button>
      </div>
      <input class="field-input" style="width:200px;height:40px;margin:0" placeholder="搜索文件名..." oninput="renderFiles(this.value)">
    </div>
    <div class="file-table" id="file-list"></div>
  </main>
</div>

<!-- ══ 上传进度面板 ══ -->
<div id="upload-panel">
  <div class="up-header" onclick="togglePanel()">
    <div class="up-header-left">
      <span>☁ 上传队列</span>
      <span class="up-badge" id="up-badge">0</span>
    </div>
    <span class="up-toggle" id="up-toggle">▲</span>
  </div>
  <div class="up-body" id="up-body"></div>
  <div class="up-footer">
    <span id="up-summary">等待上传...</span>
    <span class="up-footer-clear" onclick="clearDoneItems()">清除已完成</span>
  </div>
</div>

<!-- ══ 迷你音频播放器（紧凑单行）══ -->
<div id="mini-player">
  <div class="mp-icon">🎵</div>
  <div class="mp-title" id="mp-title">未播放</div>
  <input type="range" id="mp-seek" min="0" max="1000" value="0" step="1"
    style="width:60px;height:3px;cursor:pointer;accent-color:#fff;background:rgba(255,255,255,.2);border-radius:3px;outline:none;-webkit-appearance:none;appearance:none;flex-shrink:0"
    onmousedown="seekStart()" ontouchstart="seekStart();event.stopPropagation()"
    onchange="seekEnd(this.value)" oninput="seekPreview(this.value)">
  <div class="mp-time" id="mp-sub">0:00</div>
  <button class="mp-btn list-btn" onclick="event.stopPropagation();togglePlaylist()" title="切换音频">☰</button>
  <button class="mp-btn" id="mp-play-btn" onclick="togglePlay()">▶</button>
  <button class="mp-btn close-btn" onclick="closePlayer()" title="关闭">✕</button>
</div>

<!-- 音频列表 -->
<div id="mp-playlist">
  <div class="mp-playlist-header">当前目录音频</div>
  <div id="mp-playlist-items"></div>
</div>

<!-- ══ 分享弹窗 ══ -->
<div id="share-modal">
  <div class="share-box">
    <div class="share-title" id="share-modal-title">生成分享链接</div>
    <div class="share-sub" id="share-modal-sub"></div>
    <div id="share-modal-body">
      <div class="share-loading">正在生成链接...</div>
    </div>
    <button class="share-close-btn" onclick="closeShareModal()">关闭</button>
  </div>
</div>

<div id="overlay">
  <div class="overlay-box">
    <div style="font-size:32px">⏳</div>
    <p id="overlay-msg">处理中，请稍候...</p>
  </div>
</div>
<div id="toast"></div>
<audio id="bg-audio" style="display:none"></audio>

<!-- ══ 内嵌预览弹窗 ══ -->
<div id="preview-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:600;flex-direction:column;align-items:stretch">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#111;flex-shrink:0">
    <div id="preview-title" style="color:#fff;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80%"></div>
    <button onclick="closePreview()" style="background:none;border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:13px;flex-shrink:0">✕ 关闭</button>
  </div>
  <div id="preview-body" style="flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:12px"></div>
</div>

<script>
// ══════════════════════════════════════════════
// 分享页面检测（URL hash = #share/TOKEN）
// ══════════════════════════════════════════════
(function() {
  const hash = location.hash;
  const m = hash.match(/^#share\/(.+)$/);
  if (m) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('share-page').style.display = 'block';
    loadSharePage(m[1]);
    return;
  }
})();

async function loadSharePage(token) {
  const body = document.getElementById('share-page-body');
  // 从 hash 里拿不到 worker URL，需要从 localStorage 或 URL 参数获取
  // 我们在分享链接里把 worker URL 也编进去：#share/WORKER_BASE64/TOKEN
  // 实际 token 格式: workerB64.token
  let workerUrl, realToken;
  if (token.includes('.')) {
    const dotIdx = token.indexOf('.');
    workerUrl = atob(token.slice(0, dotIdx));
    realToken = token.slice(dotIdx + 1);
  } else {
    // 兜底：尝试从本地存储读 worker
    try { const c = JSON.parse(localStorage.getItem('r2_v9')||'{}'); workerUrl = c.worker; } catch(e){}
    realToken = token;
  }

  if (!workerUrl) {
    body.innerHTML = '<div style="text-align:center;padding:60px;color:red">无法获取服务地址，请使用完整分享链接</div>';
    return;
  }

  // 存全局，让 previewFile 在分享页也能构造 /preview/ URL
  window.shareWorkerUrl = workerUrl;

  try {
    const res = await fetch(`${workerUrl}/share/${realToken}`);
    if (!res.ok) { body.innerHTML = `<div style="text-align:center;padding:60px;color:red">${await res.text()}</div>`; return; }
    const data = await res.json();

    if (data.type === 'file') {
      body.innerHTML = `
        <div class="share-page-title">📄 共享文件</div>
        <div class="share-page-sub">通过 R2 Cloud 共享 · ${fmtSize(data.size)}</div>

          </div>
          <div class="share-file-actions">
            ${isAudio(data.name)?`<button class="share-preview-btn" onclick="previewFile('${ea(data.url)}','${ea(data.name)}','${ea(data.previewUrl||data.url)}')">▶ 播放</button>`:''}
            ${!isAudio(data.name)?`<button class="share-preview-btn" onclick="previewFile('${ea(data.url)}','${ea(data.name)}','${ea(data.previewUrl||data.url)}')">👁 预览</button>`:''}
            <button class="share-dl-btn" onclick="dlFile('${ea(data.url)}','${ea(data.name)}')">⬇ 下载</button>
          </div>
        </div>`;
    } else {
      const rows = data.files.map(f => `
        <div class="share-row">
          <div style="font-size:18px">${getIcon(f.name)}</div>
          <div class="share-row-name" title="${f.name}">${f.name}</div>
          <div class="share-row-size">${fmtSize(f.size)}</div>
          <div class="share-row-btn">
            ${isAudio(f.name)?`<button class="share-row-dl" onclick="previewFile('${ea(f.url)}','${ea(f.name)}','${ea(f.previewUrl||f.url)}')">▶ 播放</button>`:''}
            ${!isAudio(f.name)?`<button class="share-row-dl" onclick="previewFile('${ea(f.url)}','${ea(f.name)}','${ea(f.previewUrl||f.url)}')">👁 预览</button>`:''}
            <button class="share-row-dl" onclick="dlFile('${ea(f.url)}','${ea(f.name)}')">⬇ 下载</button>
          </div>
        </div>`).join('');
      body.innerHTML = `
        <div class="share-page-title">📁 ${data.name}</div>
        <div class="share-page-sub">共 ${data.files.length} 个文件 · 通过 R2 Cloud 共享</div>
        <div class="share-folder-table">${rows||'<div style="padding:40px;text-align:center;color:#999">文件夹为空</div>'}</div>`;
    }
  } catch(e) {
    body.innerHTML = `<div style="text-align:center;padding:60px;color:red">加载失败: ${e.message}</div>`;
  }
}

function renderFiles(query='') {
  const el = document.getElementById('file-list');
  const q = query.toLowerCase();
  const filtered = allFiles.filter(f => {
    const d = dn(f);
    return d && d !== '.keep' && d.toLowerCase().includes(q);
  });
  filtered.sort((a, b) => {
    if (a.isFolder !== b.isFolder) return a.isFolder ? -1 : 1;
    return dn(a).replace(/\/$/, '').localeCompare(dn(b).replace(/\/$/, ''), 'zh-CN', { sensitivity:'base' });
  });

  if (!filtered.length) { el.innerHTML = '<div style="padding:50px;text-align:center;color:#999">当前目录为空</div>'; return; }

  let html = `<div class="table-head"><div></div><div>名称</div><div>大小</div><div>修改日期</div><div style="text-align:right">操作</div></div>`;
  html += filtered.map(f => {
    const isF = f.isFolder;
    const dName = dn(f);
    const fullKey = isF ? f.name.replace(/\/$/, '') : f.name;
    const audio = !isF && isAudio(dName);
    return `<div class="file-row${isF?' is-folder':''}" onclick="${isF?`goDir('${ea(f.name)}')`:''}">
      <div style="font-size:20px">${isF?'📁':getIcon(dName)}</div>
      <div class="file-name-cell">${dName.replace(/\/$/, '')}</div>
      <div class="meta-cell">${isF?'文件夹':fmtSize(f.size)}</div>
      <div class="meta-cell">${isF?'':fmtDate(f.uploaded)}</div>
      <div class="action-group" onclick="event.stopPropagation()">
        ${audio?`<button class="action-btn" onclick="previewFile('${ea(f.url)}','${ea(dName)}','${ea(f.previewUrl||f.url)}')">▶ 播放</button>`:''}
        ${!isF&&isPPT(dName)?`<button class="action-btn" onclick="previewFile('${ea(f.url)}','${ea(dName)}','${ea(f.previewUrl||f.url)}')">👁 预览</button>`:''}
        ${!isF&&!audio&&!isPPT(dName)?`<button class="action-btn" onclick="previewFile('${ea(f.url)}','${ea(dName)}','${ea(f.previewUrl||f.url)}')">👁 预览</button>`:''}
        ${!isF?`<button class="action-btn" onclick="dlFile('${ea(f.url)}','${ea(dName)}')">下载</button>`:''}
        <button class="action-btn share-btn" onclick="doShare('${ea(fullKey)}','${isF}','${ea(dName.replace(/\/$/, ''))}')">🔗 分享</button>
        <button class="action-btn" onclick="doRename('${ea(fullKey)}','${isF}')">改名</button>
        <button class="action-btn danger" onclick="doDelete('${ea(fullKey)}','${isF}')">删除</button>
      </div>
    </div>`;
  }).join('');
  el.innerHTML = html;
}

function dn(f) { return f.name.slice(currentPrefix.length); }
function ea(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function getIcon(n) {
  const e = (n.split('.').pop()||'').toLowerCase();
  if(['mp4','mov','webm'].includes(e)) return '🎬';
  if(['mp3','wav','m4a','ogg','flac','aac'].includes(e)) return '🎵';
  if(['ppt','pptx'].includes(e)) return '📊';
  if(['jpg','jpeg','png','webp','gif'].includes(e)) return '🖼️';
  if(['pdf'].includes(e)) return '📄';
  return '📝';
}
function isImage(n) { return ['jpg','jpeg','png','gif','webp','svg'].includes((n.split('.').pop()||'').toLowerCase()); }
function isVideo(n) { return ['mp4','webm','mov'].includes((n.split('.').pop()||'').toLowerCase()); }
function isPDF(n)   { return (n.split('.').pop()||'').toLowerCase() === 'pdf'; }

// 页面内嵌预览弹窗
function previewFile(url, name, previewUrl) {
  const pu = previewUrl || url;
  const ext = (name.split('.').pop() || '').toLowerCase();

  if (isPPT(name)) {
    // Office 文件用微软在线预览
    window.open('https://view.officeapps.live.com/op/view.aspx?src=' + encodeURIComponent(url), '_blank');
    return;
  }

  if (isAudio(name)) {
    playAudio(pu, name);
    return;
  }

  // 构建内嵌预览内容
  const overlay = document.getElementById('preview-overlay');
  const title = document.getElementById('preview-title');
  const body = document.getElementById('preview-body');
  title.textContent = name;
  body.innerHTML = '';
  overlay.style.display = 'flex';

  if (isImage(name)) {
    body.innerHTML = `<img src="${pu}" style="max-width:100%;max-height:80vh;display:block;margin:auto;border-radius:4px">`;
  } else if (isVideo(name)) {
    body.innerHTML = `<video src="${pu}" controls autoplay playsinline style="max-width:100%;max-height:80vh;display:block;margin:auto"></video>`;
  } else if (isPDF(name)) {
    // 用 PDF.js 渲染，手机全兼容
    body.innerHTML = '<div style="color:#fff;font-size:13px;padding:20px">正在加载 PDF...</div>';
    loadPdfJs(pu, body);
  } else {
    body.innerHTML = '';
    overlay.style.display = 'none';
    window.open(pu, '_blank');
  }
}

// ── PDF.js 渲染 ──
let pdfJsLoaded = false;

function loadPdfJs(url, container) {
  if (!pdfJsLoaded) {
    // 动态加载 PDF.js
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs';
    script.type = 'module';
    script.onload = () => { pdfJsLoaded = true; };
    document.head.appendChild(script);
  }
  // 用 fetch 拿 PDF 二进制，再用 PDF.js 渲染
  renderPdf(url, container);
}

async function renderPdf(url, container) {
  try {
    // 动态 import PDF.js（ES module）
    const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';

    const resp = await fetch(url);
    const buf = await resp.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const total = pdf.numPages;

    container.innerHTML = '';
    container.style.cssText = 'flex:1;overflow-y:auto;display:block;padding:12px;background:#1a1a1a';

    for (let i = 1; i <= total; i++) {
      const page = await pdf.getPage(i);
      // 根据容器宽度自适应缩放
      const containerW = container.clientWidth - 24;
      const viewport0 = page.getViewport({ scale: 1 });
      // 用 devicePixelRatio 提升清晰度，Retina/高分屏效果更好
      const dpr = window.devicePixelRatio || 1;
      const scale = (containerW / viewport0.width) * dpr;
      const viewport = page.getViewport({ scale });

      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      // CSS 尺寸按实际显示大小，canvas 内部按高分辨率
      canvas.style.cssText = `display:block;margin:0 auto 12px;border-radius:4px;width:${Math.floor(viewport.width/dpr)}px;max-width:100%`;

      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport }).promise;
      container.appendChild(canvas);

      // 第一页渲染完先显示，其余后台继续
      if (i === 1) {
        const tip = document.createElement('div');
        tip.id = 'pdf-progress';
        tip.style.cssText = 'text-align:center;color:rgba(255,255,255,0.5);font-size:12px;padding:8px;font-family:monospace';
        tip.textContent = `第 1/${total} 页，加载中...`;
        container.insertBefore(tip, canvas);
      } else {
        const tip = document.getElementById('pdf-progress');
        if (tip) tip.textContent = `已加载 ${i}/${total} 页`;
        if (i === total && tip) tip.textContent = `共 ${total} 页`;
      }
    }
  } catch(e) {
    container.innerHTML = `<div style="color:#f88;padding:24px;text-align:center;font-size:14px">
      PDF 加载失败: ${e.message}<br><br>
      <a href="${url}" target="_blank" style="color:#7ab8e8">点击下载查看</a>
    </div>`;
  }
}

function dlFile(url, name) {

// ── 改名 ──
async function doRename(fullKey, isFolder) {
  const parts = fullKey.split('/');
  const oldName = parts[parts.length-1];
  const newName = prompt('输入新名称:', oldName);
  if (!newName||newName.trim()===''||newName.trim()===oldName) return;
  const parentPath = parts.slice(0,-1).join('/');
  const newKey = parentPath ? parentPath+'/'+newName.trim() : newName.trim();
  if (isFolder==='true'||isFolder===true) {
    showOverlay('正在重命名文件夹...');
    try {
      const children = await listAllUnder(fullKey+'/');
      let done=0;
      for (const child of children) { await apiRename(child.name, newKey+'/'+child.name.slice(fullKey.length+1)); showOverlay(`重命名中... ${++done}/${children.length}`); }
      hideOverlay(); showT('文件夹已重命名'); await refreshFiles();
    } catch(e) { hideOverlay(); showT('失败: '+e.message); }
  } else {
    try {
      const res = await apiRename(fullKey, newKey);
      if (res.ok) { showT('重命名成功'); await refreshFiles(); }
      else { showT('失败: '+await res.text()); }
    } catch(e) { showT('网络错误'); }
  }
}

// ── 删除 ──
async function doDelete(fullKey, isFolder) {
  const name = fullKey.split('/').pop();
  if (isFolder==='true'||isFolder===true) {
    if (!confirm(`确认删除文件夹「${name}」及其所有内容？`)) return;
    showOverlay('正在列出文件夹内容...');
    try {
      const children = await listAllUnder(fullKey+'/');
      let done=0;
      for (const child of children) { await apiDelete(child.name); showOverlay(`删除中... ${++done}/${children.length}`); }
      hideOverlay(); showT(`已删除 ${done} 个文件`); await refreshFiles();
    } catch(e) { hideOverlay(); showT('失败: '+e.message); }
  } else {
    if (!confirm(`确认删除「${name}」？`)) return;
    try {
      const res = await apiDelete(fullKey);
      if (res.ok) { allFiles=allFiles.filter(f=>f.name!==fullKey&&f.name!==fullKey+'/'); renderFiles(); showT('已删除'); await refreshFiles(); }
      else showT('删除失败');
    } catch(e) { showT('网络错误'); }
  }
}

function buildShareUrl(token) {
  const workerB64 = btoa(CFG.worker);
  const base = location.href.split('#')[0];
  return `${base}#share/${workerB64}.${token}`;
}

async function doShare(fullKey, isFolder, displayName) {
  document.getElementById('share-modal-title').textContent = `分享：${displayName}`;
  document.getElementById('share-modal-sub').textContent = isFolder==='true'||isFolder===true ? '文件夹内所有文件将对链接持有者可见' : '文件将对链接持有者可见';
  document.getElementById('share-modal-body').innerHTML = '<div class="share-loading">正在生成链接...</div>';
  document.getElementById('share-modal').classList.add('open');

  try {
    const payload = (isFolder==='true'||isFolder===true)
      ? { type:'folder', name:displayName, prefix:fullKey+'/' }
      : { type:'file', name:displayName, key:fullKey };

    const res = await fetch(`${CFG.worker}/share/create`, {
      method:'POST', headers:ah({'Content-Type':'application/json'}), body:JSON.stringify(payload)
    });
    const data = await res.json();
    const shareUrl = buildShareUrl(data.token);

    document.getElementById('share-modal-body').innerHTML = `
      <div class="share-link-wrap">
        <input class="share-link-input" id="share-link-val" value="${shareUrl}" readonly>
        <button class="share-copy-btn" onclick="copyShareLink()">复制链接</button>
      </div>
      <div style="font-size:12px;color:var(--ink2)">链接长期有效，可随时通过删除分享记录来撤销</div>`;
  } catch(e) {
    document.getElementById('share-modal-body').innerHTML = `<div style="color:red;font-size:13px">生成失败: ${e.message}</div>`;
  }
}

  player.classList.add('visible');
  updatePlayBtn();

function togglePlay() {
  if (audio.paused) audio.play(); else audio.pause();
  updatePlayBtn();
}

function updatePlayBtn() {
  document.getElementById('mp-play-btn').textContent = audio.paused ? '▶' : '⏸';
}

  audio.pause(); audio.src = '';
  currentAudioUrl = '';
  player.classList.remove('visible');
  closePlaylist();
}

let isSeeking = false;

function seekStart() {
  isSeeking = true;
}

function seekPreview(val) {
  // 拖动过程中只更新时间显示，不跳转
  if (audio.duration) {
    const t = (val / 1000) * audio.duration;
    document.getElementById('mp-sub').textContent = fmtTime(t) + ' / ' + fmtTime(audio.duration);
  }
}

function seekEnd(val) {
  if (audio.duration) {
    audio.currentTime = (val / 1000) * audio.duration;
  }
  isSeeking = false;
}

function fmtTime(s) {
  if (!s||isNaN(s)) return '0:00';
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m+':'+(sec<10?'0':'')+sec;
}

audio.addEventListener('timeupdate', () => {
  if (isSeeking) return; // 拖动中不更新滑块
  if (audio.duration) {
    document.getElementById('mp-seek').value = (audio.currentTime / audio.duration) * 1000;
  }
  document.getElementById('mp-sub').textContent = fmtTime(audio.currentTime) + ' / ' + fmtTime(audio.duration);
});
audio.addEventListener('play', updatePlayBtn);
audio.addEventListener('pause', updatePlayBtn);
audio.addEventListener('ended', () => {
  updatePlayBtn();
  document.getElementById('mp-sub').textContent = '已结束';
  playNext();
});

document.addEventListener('mouseup', () => { isSeeking = false; });
document.addEventListener('touchend', () => { isSeeking = false; });

// ── 播放列表 ──
function togglePlaylist() {
  playlistOpen = !playlistOpen;
  const pl = document.getElementById('mp-playlist');
  if (playlistOpen) {
    renderPlaylist();
    pl.classList.add('open');
  } else {
    pl.classList.remove('open');
  }
}

function closePlaylist() {
  playlistOpen = false;
  document.getElementById('mp-playlist').classList.remove('open');
}

// 全局音频列表（递归拉取所有目录）
let globalAudioList = [];

function syncAudioList() {
  // 把当前目录的音频文件合并进全局列表
  const cur = allFiles.filter(f => !f.isFolder && isAudio(dn(f)));
  cur.forEach(f => {
    const key = f.previewUrl || f.url;
    if (!globalAudioList.find(x => (x.previewUrl||x.url) === key)) {
      globalAudioList.push(f);
    }
  });
}

// 递归拉取所有音频（调用 /list-all 接口）
let _loadAudioPromise = null;
async function loadAllAudio() {
  if (_loadAudioPromise) return _loadAudioPromise;
  _loadAudioPromise = (async () => {
    try {
      const res = await fetch(`${CFG.worker}/list-all?prefix=`, { headers: ah() });
      const all = await res.json();
      const audioExts = ['mp3','wav','m4a','ogg','flac','aac','opus','wma'];
      globalAudioList = all
        .filter(f => audioExts.includes((f.name.split('.').pop()||'').toLowerCase()))
        .map(f => ({
          name: f.name,
          size: f.size,
          isFolder: false,
          url: `${CFG.worker}/preview/${f.name}`,
          previewUrl: `${CFG.worker}/preview/${f.name}`,
        }));
    } catch(e) {
      console.log('loadAllAudio error', e);
    }
  })();
  return _loadAudioPromise;
}

function renderPlaylist() {
  const items = document.getElementById('mp-playlist-items');
  // 只显示当前目录的音频文件
  const audioFiles = allFiles.filter(f => !f.isFolder && isAudio(f.name.slice(currentPrefix.length)));
  if (!audioFiles.length) {
    items.innerHTML = '<div style="padding:16px;font-size:12px;color:rgba(255,255,255,.3);text-align:center">当前目录无音频</div>';
    return;
  }
  items.innerHTML = audioFiles.map(f => {
    const fname = f.name.slice(currentPrefix.length);
    const pu = f.previewUrl || f.url;
    const isPlaying = pu === currentAudioUrl;
    return `<div class="mp-playlist-item${isPlaying?' playing':''}" onclick="playAudio('${ea(pu)}','${ea(fname)}');closePlaylist()">
      <div class="mp-playlist-item-icon">${isPlaying && !audio.paused ? '▶' : '🎵'}</div>
      <div class="mp-playlist-item-name" title="${ea(fname)}">${fname}</div>
      ${isPlaying ? '<div class="mp-playlist-item-playing">▶</div>' : ''}
    </div>`;
  }).join('');
}

// 自动播放下一首
function playNext() {
  const audioFiles = allFiles.filter(f => !f.isFolder && isAudio(f.name.slice(currentPrefix.length)));
  if (!audioFiles.length) return;
  const idx = audioFiles.findIndex(f => (f.previewUrl||f.url) === currentAudioUrl);
  const next = audioFiles[(idx + 1) % audioFiles.length];
  if (next) {
    const fname = next.name.slice(currentPrefix.length);
    playAudio(next.previewUrl || next.url, fname);
  }
}

// 点击弹窗外关闭播放列表
document.addEventListener('click', e => {
  if (!playlistOpen) return;
  const pl = document.getElementById('mp-playlist');
  const btn = e.target.closest('.list-btn');
  if (!pl.contains(e.target) && !btn) {
    closePlaylist();
  }
});

// ══════════════════════════════════════════════
// 上传
// ══════════════════════════════════════════════
const CHUNK = 90 * 1024 * 1024;
let uploadItems = [], panelCollapsed = false;

function togglePanel() {
  panelCollapsed = !panelCollapsed;
  document.getElementById('up-body').classList.toggle('collapsed', panelCollapsed);
  document.getElementById('up-toggle').classList.toggle('collapsed', panelCollapsed);
}
function clearDoneItems() {
  uploadItems = uploadItems.filter(i=>i.status!=='done'&&i.status!=='fail');
  renderPanel();
  if (!uploadItems.length) document.getElementById('upload-panel').classList.remove('visible');
}
function renderPanel() {
  const body=document.getElementById('up-body'), badge=document.getElementById('up-badge'), summary=document.getElementById('up-summary');
  const active=uploadItems.filter(i=>i.status==='uploading'||i.status==='pending');
  const done=uploadItems.filter(i=>i.status==='done').length;
  const fail=uploadItems.filter(i=>i.status==='fail').length;
  badge.textContent=uploadItems.length;
  badge.className='up-badge'+(active.length===0&&uploadItems.length>0?' done':'');
  summary.textContent=active.length?`上传中 ${done}/${uploadItems.length}`:uploadItems.length?`完成 ${done} · 失败 ${fail}`:'等待上传...';
  body.innerHTML=uploadItems.map(item=>{
    const pctText=item.status==='done'?'✓':item.status==='fail'?'✗':item.pct+'%';
    const barClass=item.status==='done'?'success':item.status==='fail'?'fail':'';
    const stClass=item.status==='done'?'ok':item.status==='fail'?'err':'';
    const stText=item.status==='done'?'上传成功':item.status==='fail'?'上传失败':item.status==='uploading'?'上传中...':'等待中';
    const extra=item.isMultipart?` · 分片${item.partDone}/${item.partTotal}`:(item.size?' · '+fmtSize(item.size):'');
    return `<div class="up-item"><div class="up-item-top"><div class="up-item-name" title="${item.name}">${item.name}</div><div class="up-item-pct">${pctText}</div></div><div class="up-bar-bg"><div class="up-bar-fill ${barClass}" style="width:${item.pct}%"></div></div><div class="up-status ${stClass}">${stText}${extra}</div></div>`;
  }).join('');
}
function setItem(id,patch){const i=uploadItems.find(x=>x.id===id);if(i)Object.assign(i,patch);renderPanel();}

async function handleUpload(files) {
  if (!files.length) return;
  document.getElementById('upload-panel').classList.add('visible');
  if (panelCollapsed) togglePanel();
  const newItems = Array.from(files).map((f,i)=>({ id:Date.now()+i, name:f.name, size:f.size, pct:0, status:'pending', isMultipart:f.size>CHUNK, partDone:0, partTotal:0, file:f }));
  uploadItems=[...uploadItems,...newItems]; renderPanel();
  for (const item of newItems) {
    setItem(item.id,{status:'uploading',pct:0});
    try {
      if (item.file.size>CHUNK) await uploadMultipart(item);
      else await uploadSimple(item);
      setItem(item.id,{status:'done',pct:100});
    } catch(e) { setItem(item.id,{status:'fail'}); }
  }
  await refreshFiles();
}

async function uploadSimple(item) {
  return new Promise((resolve,reject)=>{
    const xhr=new XMLHttpRequest();
    xhr.open('PUT',`${CFG.worker}/${encodeURIComponent(currentPrefix+item.file.name)}`);
    xhr.setRequestHeader('X-Auth-Key',CFG.key);
    xhr.setRequestHeader('Content-Type',item.file.type||'application/octet-stream');
    xhr.upload.onprogress=e=>{if(e.lengthComputable)setItem(item.id,{pct:Math.round(e.loaded/e.total*100)});};
    xhr.onload=()=>xhr.status>=200&&xhr.status<300?resolve():reject(new Error('HTTP '+xhr.status));
    xhr.onerror=()=>reject(new Error('网络错误'));
    xhr.send(item.file);
  });
}

async function uploadMultipart(item) {
  const key=currentPrefix+item.file.name;
  const totalChunks=Math.ceil(item.file.size/CHUNK);
  setItem(item.id,{partTotal:totalChunks,partDone:0,pct:0});
  const cr=await fetch(`${CFG.worker}/multipart/create`,{method:'POST',headers:ah({'Content-Type':'application/json'}),body:JSON.stringify({key,contentType:item.file.type||'application/octet-stream'})});
  const {uploadId}=await cr.json();
  const parts=[];
  try {
    for(let i=0;i<totalChunks;i++){
      const chunk=item.file.slice(i*CHUNK,Math.min((i+1)*CHUNK,item.file.size));
      const etag=await new Promise((resolve,reject)=>{
        const xhr=new XMLHttpRequest();
        xhr.open('PUT',`${CFG.worker}/multipart/part?key=${encodeURIComponent(key)}&uploadId=${encodeURIComponent(uploadId)}&partNumber=${i+1}`);
        xhr.setRequestHeader('X-Auth-Key',CFG.key);
        xhr.upload.onprogress=e=>{if(e.lengthComputable)setItem(item.id,{pct:Math.round((i+e.loaded/e.total)/totalChunks*100)});};
        xhr.onload=()=>xhr.status>=200&&xhr.status<300?resolve(JSON.parse(xhr.responseText).etag):reject(new Error('HTTP '+xhr.status));
        xhr.onerror=()=>reject(new Error('网络错误'));
        xhr.send(chunk);
      });
      parts.push({partNumber:i+1,etag});
      setItem(item.id,{partDone:i+1,pct:Math.round((i+1)/totalChunks*100)});
    }
    await fetch(`${CFG.worker}/multipart/complete`,{method:'POST',headers:ah({'Content-Type':'application/json'}),body:JSON.stringify({key,uploadId,parts})});
  } catch(e) {
    await fetch(`${CFG.worker}/multipart/abort`,{method:'POST',headers:ah({'Content-Type':'application/json'}),body:JSON.stringify({key,uploadId})}).catch(()=>{});
    throw e;
  }
}

async function createFolder() {
  const n=prompt('文件夹名:'); if(!n||!n.trim()) return;
  await fetch(`${CFG.worker}/${encodeURIComponent(currentPrefix+n.trim()+'/.keep')}`,{method:'PUT',headers:ah({'Content-Type':'text/plain'}),body:''});
  showT('文件夹已创建'); await refreshFiles();
}

function showOverlay(msg){document.getElementById('overlay-msg').textContent=msg;document.getElementById('overlay').classList.add('show');}
function hideOverlay(){document.getElementById('overlay').classList.remove('show');}

let toastT;
function showT(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';clearTimeout(toastT);toastT=setTimeout(()=>t.style.display='none',3000);}

function fmtSize(b){if(!b)return'—';if(b<1048576)return(b/1024).toFixed(1)+' KB';if(b<1073741824)return(b/1048576).toFixed(1)+' MB';return(b/1073741824).toFixed(2)+' GB';}
function fmtDate(d){return d?new Date(d).toLocaleDateString('zh-CN'):'—';}

window.onload=()=>{if(!location.hash.startsWith('#share/'))if(loadConfig())boot();};
