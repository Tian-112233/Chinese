<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>R2 Cloud Manager - 大文件支持版</title>
  <link href="https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Sora:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f5f2ec; --surface:#fff; --surface2:#f0ede6; --border:#e0dbd0;
      --ink:#1c1a16; --ink2:#5a5650; --accent:#c8441a; --radius:8px;
      --shadow:0 2px 8px rgba(0,0,0,.05); --success:#2d7a45; --danger:#c8441a;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--ink);font-family:'Sora',sans-serif;min-height:100vh}

    #login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100}
    .login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px 30px;width:100%;max-width:400px;box-shadow:var(--shadow)}
    .field-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-family:'JetBrains Mono',monospace;margin:8px 0 20px;outline:none;font-size:14px}
    .btn-primary{width:100%;background:var(--ink);color:var(--bg);border:none;border-radius:var(--radius);padding:14px;font-weight:700;cursor:pointer}

    #app{display:none}
    header{background:var(--ink);color:var(--bg);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
    .breadcrumb-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:8px;font-size:13px;overflow-x:auto}
    .bc-item{color:var(--accent);font-weight:600;cursor:pointer}

    main{max-width:1200px;margin:0 auto;padding:20px}
    .upload-area{border:2px dashed var(--border);border-radius:var(--radius);background:var(--surface);margin-bottom:24px;text-align:center;padding:40px 20px;cursor:pointer}
    .file-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
    .table-head, .file-row{display:grid;grid-template-columns:50px 1fr 100px 160px 220px;padding:14px 20px;align-items:center;border-bottom:1px solid var(--border)}
    .table-head{background:var(--surface2);font-size:11px;font-weight:700;color:var(--ink2);text-transform:uppercase}
    .action-btn{background:none;border:1px solid var(--border);padding:6px 12px;font-size:12px;cursor:pointer;border-radius:4px;margin-left:5px}

    @media(max-width:850px){
      .table-head{display:none}
      .file-row{grid-template-columns:40px 1fr;padding:16px;gap:6px 12px}
      .file-name-cell{grid-column:2;font-weight:700;font-size:15px}
      .meta-cell{grid-column:2;font-size:11px;color:var(--ink2);display:flex;gap:10px}
      .action-group{grid-column:1/span 2;justify-content:flex-start;margin-top:10px;flex-wrap:wrap;gap:8px}
      .action-btn{flex:1;text-align:center;min-width:70px;padding:10px 0}
    }

    #upload-panel { position:fixed; top:70px; right:20px; width:300px; background:#fff; border:1px solid var(--border); border-radius:12px; display:none; flex-direction:column; z-index:200; box-shadow:var(--shadow); }
    .up-header { padding:12px; background:var(--ink); color:#fff; font-size:13px; font-weight:600; border-radius:12px 12px 0 0; }
    .up-item { padding:10px; border-bottom:1px solid var(--border); font-size:12px; }
    .up-bar { height:4px; background:var(--border); margin-top:5px; border-radius:2px; overflow:hidden; }
    .up-fill { height:100%; background:var(--accent); width:0%; transition:width .2s; }
    #toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 24px;border-radius:30px;display:none;z-index:2000}
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2 style="text-align:center;margin-bottom:20px">R2 Manager</h2>
    <input class="field-input" id="inp-worker" placeholder="Worker URL">
    <input class="field-input" id="inp-key" type="password" placeholder="Access Key">
    <button class="btn-primary" onclick="saveConfig()">登录</button>
  </div>
</div>

<div id="app">
  <header><div style="font-weight:700">▣ R2 STORAGE</div><button onclick="clearConfig()" style="background:none;border:none;color:#fff;font-size:12px;cursor:pointer">退出</button></header>
  <div class="breadcrumb-bar" id="breadcrumb"></div>
  <main>
    <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <strong>☁ 点击或拖拽上传 (支持大文件)</strong>
      <input type="file" id="file-input" multiple style="display:none" onchange="handleUpload(this.files)">
    </div>
    <div class="toolbar" style="display:flex;justify-content:space-between;margin-bottom:20px">
      <button class="btn-primary" style="width:auto;padding:10px 20px" onclick="createFolder()">+ 文件夹</button>
      <input class="field-input" style="width:200px;margin:0" placeholder="搜索..." oninput="renderFiles(this.value)">
    </div>
    <div class="file-table" id="file-list"></div>
  </main>
</div>

<div id="upload-panel"><div class="up-header">上传队列</div><div id="up-body"></div></div>
<div id="toast"></div>

<script>
let CFG = {}, allFiles = [], currentPrefix = '';

function saveConfig() {
  const w = document.getElementById('inp-worker').value.trim().replace(/\/$/, '');
  const k = document.getElementById('inp-key').value.trim();
  CFG = { worker: w, key: k };
  localStorage.setItem('r2_big', JSON.stringify(CFG));
  boot();
}
function loadConfig() { const s = localStorage.getItem('r2_big'); if(s){ CFG=JSON.parse(s); return true; } return false; }
function clearConfig() { localStorage.removeItem('r2_big'); location.reload(); }
function boot() { document.getElementById('login-screen').style.display='none'; document.getElementById('app').style.display='block'; refreshFiles(); }

async function refreshFiles() {
  const el = document.getElementById('file-list');
  el.innerHTML = '<div style="padding:40px;text-align:center">读取中...</div>';
  updateBread();
  try {
    const res = await fetch(`${CFG.worker}/list?prefix=${encodeURIComponent(currentPrefix)}`, { headers: {'X-Auth-Key': CFG.key} });
    allFiles = await res.json();
    renderFiles();
  } catch(e) { el.innerHTML = '加载失败'; }
}

function updateBread() {
  const b = document.getElementById('breadcrumb');
  const parts = currentPrefix.split('/').filter(Boolean);
  let h = `<span class="bc-item" onclick="goDir('')">根目录</span>`;
  let p = '';
  parts.forEach(x => { p += x + '/'; h += ` <span style="color:#ccc">/</span> <span class="bc-item" onclick="goDir('${p}')">${x}</span>`; });
  b.innerHTML = h;
}
function goDir(p) { currentPrefix = p; refreshFiles(); }

function renderFiles(query='') {
  const el = document.getElementById('file-list');
  const filtered = allFiles.filter(f => f.name.toLowerCase().includes(query.toLowerCase()));
  let html = `<div class="table-head"><div></div><div>名称</div><div>大小</div><div>修改日期</div><div style="text-align:right">操作</div></div>`;
  html += filtered.map(f => {
    const isF = f.isFolder;
    const dName = f.name.slice(currentPrefix.length);
    if(dName === '.keep') return '';
    return `<div class="file-row" onclick="${isF?`goDir('${f.name}')`:''}">
      <div style="font-size:20px">${isF?'📁':'📄'}</div>
      <div class="file-name-cell">${dName}</div>
      <div class="meta-cell"><span>${isF?'—':fmtSize(f.size)}</span><span>${isF?'—':new Date(f.uploaded).toLocaleDateString()}</span></div>
      <div class="action-group" onclick="event.stopPropagation()">
        ${!isF ? `<button class="action-btn" onclick="previewFile('${f.url}','${dName}')">预览</button>` : ''}
        <button class="action-btn" onclick="renameFile('${f.name}')">改名</button>
        <button class="action-btn" style="color:var(--danger)" onclick="delFile('${f.name}')">删除</button>
      </div>
    </div>`;
  }).join('');
  el.innerHTML = html;
}

function previewFile(url, name) {
  const e = name.split('.').pop().toLowerCase();
  if (['ppt','pptx','doc','docx'].includes(e)) window.open(`https://view.officeapps.live.com/op/view.aspx?src=${encodeURIComponent(url)}`, '_blank');
  else window.open(url, '_blank');
}

// 核心：大文件分片上传逻辑
async function handleUpload(files) {
  if (!files.length) return;
  document.getElementById('upload-panel').style.display = 'flex';
  const CHUNK_SIZE = 10 * 1024 * 1024; // 每片 10MB

  for (const file of files) {
    const key = currentPrefix + file.name;
    const upId = Date.now();
    addUpItem(upId, file.name);

    try {
      if (file.size < 95 * 1024 * 1024) {
        // 小文件直传
        await fetch(`${CFG.worker}/${encodeURIComponent(key)}`, {
          method: 'PUT', headers: {'X-Auth-Key': CFG.key, 'Content-Type': file.type}, body: file
        });
        updateUpItem(upId, 100);
      } else {
        // 大文件分片
        const startRes = await fetch(`${CFG.worker}/start-upload`, {
          method: 'POST', headers: {'X-Auth-Key': CFG.key}, body: JSON.stringify({key, contentType: file.type})
        });
        const { uploadId } = await startRes.json();
        const parts = [];
        const totalChunks = Math.ceil(file.size / CHUNK_SIZE);

        for (let i = 0; i < totalChunks; i++) {
          const chunk = file.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE);
          const pNum = i + 1;
          const upRes = await fetch(`${CFG.worker}/upload-part?key=${encodeURIComponent(key)}`, {
            method: 'PUT', headers: {'X-Auth-Key': CFG.key, 'X-Upload-ID': uploadId, 'X-Part-Number': pNum}, body: chunk
          });
          parts.push(await upRes.json());
          updateUpItem(upId, Math.round((pNum / totalChunks) * 100));
        }

        await fetch(`${CFG.worker}/complete-upload`, {
          method: 'POST', headers: {'X-Auth-Key': CFG.key}, body: JSON.stringify({key, uploadId, parts})
        });
      }
    } catch (e) { alert('上传失败: ' + file.name); }
  }
  showT('上传完成'); refreshFiles();
}

function addUpItem(id, name) {
  const row = document.createElement('div');
  row.className = 'up-item'; row.id = 'up-'+id;
  row.innerHTML = `<div>${name}</div><div class="up-bar"><div class="up-fill" id="fill-${id}"></div></div>`;
  document.getElementById('up-body').appendChild(row);
}
function updateUpItem(id, pct) { document.getElementById('fill-'+id).style.width = pct + '%'; }

async function renameFile(oldP) {
  const newN = prompt('新名称:', oldP.split('/').pop());
  if(!newN) return;
  await fetch(`${CFG.worker}/rename`, {
    method: 'POST', headers: {'X-Auth-Key': CFG.key}, body: JSON.stringify({oldPath: oldP, newPath: currentPrefix+newN})
  });
  refreshFiles();
}

async function delFile(p) { if(confirm('删除？')) { await fetch(`${CFG.worker}/${encodeURIComponent(p)}`, { method: 'DELETE', headers: {'X-Auth-Key': CFG.key} }); refreshFiles(); } }
async function createFolder() {
  const n = prompt('文件夹名:'); if(!n) return;
  await fetch(`${CFG.worker}/${encodeURIComponent(currentPrefix+n+'/.keep')}`, { method: 'PUT', headers: {'X-Auth-Key': CFG.key}, body: '' });
  refreshFiles();
}
function fmtSize(b) { return b < 1048576 ? (b/1024).toFixed(1)+'KB' : (b/1048576).toFixed(1)+'MB'; }
function showT(m) { const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2500); }
window.onload = () => { if(loadConfig()) boot(); };
</script>
</body>
</html>
